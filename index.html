<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlengerGram</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        igGray: '#121212',
                        igBorder: '#262626',
                        igHover: '#1a1a1a',
                        igBlue: '#0095f6',
                        igDarkBlue: '#00376b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Sembunyikan scrollbar untuk pengalaman estetika premium */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <!-- CONTAINER UTAMA APLIKASI -->
    <div id="app" class="flex w-full min-h-screen"></div>

    <!-- Firebase SDK Modular Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getFirestore, doc, setDoc, getDoc, getDocs, collection, 
            updateDoc, onSnapshot, arrayUnion, arrayRemove, query, where, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { 
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- DETEKSI & STRATEGI CLOUD PERSISTENCE ---
        let firebaseConfig = {};
        let useCloud = false;
        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                if (firebaseConfig && firebaseConfig.apiKey) {
                    useCloud = true;
                }
            }
        } catch (e) {
            console.warn("Konfigurasi Firebase belum terpasang atau tidak valid. Menggunakan penyimpanan Lokal.", e);
        }

        if (useCloud) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (e) {
                console.error("Gagal melakukan inisialisasi Firebase SDK:", e);
                useCloud = false;
            }
        }

        // --- PENGHAPUSAN DAN PENYEGARAN DATA TOTAL (CLEAN WIPE) ---
        const HAS_RESET = 'plengergram_force_wipe_all_data_v105_realtime';
        if (!localStorage.getItem(HAS_RESET)) {
            localStorage.clear();
            localStorage.setItem(HAS_RESET, 'true');
        }

        // --- STATE MANAGEMENT ---
        let accounts = [];
        let memories = [];
        let chats = {};
        
        let currentUserId = ""; 
        let activePage = 'home'; // 'home', 'messages', 'profile'
        let currentChatWithId = null;
        let authMode = 'signup'; 
        let isUserLoggedIn = false;

        // Filter pencarian pengguna terdaftar
        let userSearchQuery = "";
        let profileSearchQuery = "";

        // Filter tanggal kalender (Tahun & Bulan Saat Ini)
        const todayDate = new Date();
        let currentYear = todayDate.getFullYear();
        let currentMonth = todayDate.getMonth(); 
        let selectedDateStr = ""; 

        // State untuk Bar Pintasan Terapung
        let isShortcutBarOpen = false;
        let shortcutSearchQuery = "";

        const MONTH_NAMES = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni",
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
        ];

        // --- SYSTEM LOCAL FALLBACK UTILITIES ---
        function saveLocalData() {
            if (!useCloud) {
                localStorage.setItem('pg_accounts', JSON.stringify(accounts));
                localStorage.setItem('pg_memories', JSON.stringify(memories));
                localStorage.setItem('pg_chats', JSON.stringify(chats));
            }
        }

        // --- SISTEM FIREBASE CLOUD PERSISTENCE ---
        const getPublicDataColRef = (collName) => collection(db, 'artifacts', appId, 'public', 'data', collName);
        const getPublicDataDocRef = (collName, docId) => doc(db, 'artifacts', appId, 'public', 'data', collName, docId);

        function getChatRoomId(userId1, userId2) {
            return [userId1, userId2].sort().join('_');
        }

        async function authenticateUser() {
            if (!useCloud) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
                useCloud = false; // Turun ke offline jika gagal
            }
        }

        function setupDataSync(user) {
            if (!user || !useCloud) return;

            // 1. Sync Akun Pengguna (Tanpa Bot)
            onSnapshot(getPublicDataColRef('accounts'), (snapshot) => {
                accounts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.id) {
                        accounts.push(data);
                    }
                });
                
                const loggedInId = localStorage.getItem('pg_logged_in_id');
                if (loggedInId && accounts.some(acc => acc.id === loggedInId)) {
                    currentUserId = loggedInId;
                    isUserLoggedIn = true;
                }
                renderApp();
            }, (err) => console.error("Error syncing accounts:", err));

            // 2. Sync Kenangan (Memories)
            onSnapshot(getPublicDataColRef('memories'), (snapshot) => {
                memories = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.title && data.date) {
                        memories.push(data);
                    }
                });
                renderApp();
            }, (err) => console.error("Error syncing memories:", err));

            // 3. Sync Chat Obrolan Bersama
            onSnapshot(getPublicDataColRef('chats'), (snapshot) => {
                chats = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data) {
                        chats[doc.id] = data.messages || [];
                    }
                });
                renderApp();
            }, (err) => console.error("Error syncing chats:", err));
        }

        function getCurrentUser() {
            return accounts.find(acc => acc.id === currentUserId) || null;
        }

        // --- SISTEM NAVIGASI ---
        window.navigateTo = function(page, targetId = null) {
            activePage = page;
            if (page === 'messages') {
                if (targetId) {
                    currentChatWithId = targetId;
                } else {
                    const currentUser = getCurrentUser();
                    if (currentUser) {
                        const availableFriends = accounts.filter(a => a.id !== currentUser.id);
                        if (availableFriends.length > 0) {
                            currentChatWithId = availableFriends[0].id;
                        } else {
                            currentChatWithId = null;
                        }
                    }
                }
                scrollToBottom();
            }
            renderApp();
        }

        // --- FORMAT TANGGAL INDONESIA ---
        window.formatIndonesianDate = function(dateStr) {
            if (!dateStr) return "";
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            
            const year = parts[0];
            const monthIndex = parseInt(parts[1], 10) - 1;
            const day = parseInt(parts[2], 10);
            
            const monthName = MONTH_NAMES[monthIndex] || parts[1];
            return `${day} ${monthName} ${year}`;
        }

        // --- NAVIGASI KALENDER & FILTER ---
        window.changeMonth = function(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderApp();
        }

        window.filterByDate = function(dateStr) {
            if (selectedDateStr === dateStr) {
                selectedDateStr = ""; 
            } else {
                selectedDateStr = dateStr;
            }
            renderApp();
        }

        window.clearDateFilter = function() {
            selectedDateStr = "";
            renderApp();
        }

        // --- SISTEM DINAMIS PENGIKUT (FOLLOW SYSTEM) ---
        window.getFollowingCount = function(userId) {
            const acc = accounts.find(a => a.id === userId);
            return acc && acc.followingIds ? acc.followingIds.length : 0;
        }

        window.getFollowersCount = function(userId) {
            return accounts.filter(a => a.followingIds && a.followingIds.includes(userId)).length;
        }

        window.isFollowingTarget = function(currentId, targetId) {
            const acc = accounts.find(a => a.id === currentId);
            return acc && acc.followingIds && acc.followingIds.includes(targetId);
        }

        window.toggleFollowUser = async function(targetId) {
            const currentUser = getCurrentUser();
            if (!currentUser || currentUser.id === targetId) return;

            if (!currentUser.followingIds) {
                currentUser.followingIds = [];
            }

            const isFollowing = currentUser.followingIds.includes(targetId);
            const targetAcc = accounts.find(a => a.id === targetId);

            let updatedFollowing = [];
            if (isFollowing) {
                updatedFollowing = currentUser.followingIds.filter(id => id !== targetId);
                showCustomToast(`Anda berhenti mengikuti @${targetAcc.username}`);
            } else {
                updatedFollowing = [...currentUser.followingIds, targetId];
                showCustomToast(`Anda sekarang mengikuti @${targetAcc.username}!`);
            }

            try {
                if (useCloud) {
                    const userDocRef = getPublicDataDocRef('accounts', currentUser.id);
                    await updateDoc(userDocRef, { followingIds: updatedFollowing });
                } else {
                    currentUser.followingIds = updatedFollowing;
                    saveLocalData();
                    renderApp();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // --- MANAJEMEN AUTENTIKASI ---

        window.handleLogin = function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('login-username').value.trim().toLowerCase();
            const passwordInput = document.getElementById('login-password').value;

            const user = accounts.find(acc => acc.username === usernameInput && acc.password === passwordInput);
            if (user) {
                currentUserId = user.id;
                isUserLoggedIn = true;
                localStorage.setItem('pg_logged_in_id', user.id);
                showCustomToast(`Selamat datang kembali, @${user.username}!`);
                navigateTo('home');
            } else {
                showCustomModal("Gagal Masuk", "Username atau password salah. Silakan coba lagi atau daftar akun baru.");
            }
        }

        window.handleSignUp = async function(e) {
            e.preventDefault();
            const username = document.getElementById('signup-username').value.trim().toLowerCase();
            const fullName = document.getElementById('signup-fullname').value.trim();
            const password = document.getElementById('signup-password').value;
            const bio = document.getElementById('signup-bio').value.trim() || "Halo! Saya pengguna baru di PlengerGram.";

            if (!username || !fullName || !password) {
                showCustomToast("Semua kolom bertanda bintang (*) wajib diisi!");
                return;
            }

            if (accounts.some(acc => acc.username === username)) {
                showCustomModal("Gagal Mendaftar", "Nama pengguna ini sudah digunakan.");
                return;
            }

            const newId = 'user_' + Date.now();
            const randomSeed = Math.floor(Math.random() * 1000);
            const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${randomSeed}`;

            const newAccount = {
                id: newId,
                username: username,
                fullName: fullName,
                password: password,
                avatar: avatarUrl,
                bio: bio,
                followingIds: [],
                isBot: false
            };

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('accounts', newId), newAccount);
                } else {
                    accounts.push(newAccount);
                    saveLocalData();
                }
                currentUserId = newId;
                isUserLoggedIn = true;
                localStorage.setItem('pg_logged_in_id', newId);

                showCustomToast("Pendaftaran berhasil! Selamat datang di PlengerGram.");
                navigateTo('home');
            } catch (err) {
                console.error("Gagal menyimpan akun baru:", err);
                showCustomToast("Terjadi kesalahan sistem pendaftaran cloud.");
            }
        }

        window.handleLogout = function() {
            isUserLoggedIn = false;
            currentUserId = "";
            localStorage.removeItem('pg_logged_in_id');
            showCustomToast("Anda telah keluar akun.");
            authMode = 'signup'; 
            renderApp();
        }

        window.toggleAuthMode = function() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            renderApp();
        }

        // --- SEARCH HANDLER ---
        window.handleUserSearch = function(val) {
            userSearchQuery = val;
            renderApp();
            const inp = document.getElementById('user-search-input');
            if (inp) {
                inp.focus();
                inp.setSelectionRange(val.length, val.length);
            }
        }

        window.handleProfileSearch = function(val) {
            profileSearchQuery = val;
            renderApp();
            const inp = document.getElementById('profile-search-input');
            if (inp) {
                inp.focus();
                inp.setSelectionRange(val.length, val.length);
            }
        }

        // --- RENDERING STRUKTUR NAVIGASI ---

        function renderNavigation() {
            const currentUser = getCurrentUser();
            if (!currentUser) return { desktopNav: "", mobileNav: "" };
            
            // Sidebar Desktop
            const desktopNav = `
                <div class="hidden md:flex flex-col justify-between w-64 h-screen border-r border-igBorder p-5 bg-black sticky top-0 z-20">
                    <div class="flex flex-col gap-6">
                        <!-- Logo Header -->
                        <div class="py-4 px-2 flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                            <i class="fa-solid fa-calendar-heart text-3xl text-igBlue"></i>
                            <span class="font-bold text-xl tracking-wide font-sans text-white">PlengerGram</span>
                        </div>
                        <!-- Menu List -->
                        <nav class="flex flex-col gap-2">
                            <button onclick="navigateTo('home')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'home' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <i class="fa-solid fa-calendar-days text-xl"></i> <span>Momen Bersama</span>
                            </button>
                            <button onclick="navigateTo('messages')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'messages' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <i class="fa-regular fa-paper-plane text-xl"></i> <span>Pesan & Teman</span>
                            </button>
                            <button onclick="navigateTo('profile')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'profile' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <img src="${currentUser.avatar}" class="w-6 h-6 rounded-full border border-gray-600" /> <span>Profil Akun</span>
                            </button>
                        </nav>
                    </div>

                    <!-- Panel Bawah Sidebar -->
                    <div class="border-t border-igBorder pt-4 flex flex-col gap-3">
                        <button onclick="toggleShortcutBar()" class="flex items-center justify-between w-full p-2.5 bg-igDarkBlue/25 hover:bg-igDarkBlue/50 text-igBlue text-xs font-bold rounded-lg transition border border-igBlue/30">
                            <span><i class="fa-solid fa-clock-rotate-left mr-1.5"></i> Pintasan Timeline</span>
                            <i class="fa-solid ${isShortcutBarOpen ? 'fa-chevron-down' : 'fa-chevron-up'} text-[10px]"></i>
                        </button>
                        
                        <div class="flex items-center gap-3 px-2">
                            <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full bg-igGray">
                            <div class="min-w-0">
                                <p class="font-bold text-xs truncate">@${currentUser.username}</p>
                                <p class="text-[10px] text-gray-500 truncate">${currentUser.fullName}</p>
                            </div>
                        </div>
                        <button onclick="handleLogout()" class="flex items-center gap-3 p-2.5 text-red-500 hover:bg-red-950/20 rounded-lg transition w-full text-left text-xs font-semibold">
                            <i class="fa-solid fa-right-from-bracket text-base"></i> Keluar Akun
                        </button>
                    </div>
                </div>
            `;

            // Bottom Nav Mobile
            const mobileNav = `
                <div class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-black border-t border-igBorder flex items-center justify-around z-30 px-2 shadow-lg">
                    <button onclick="navigateTo('home')" class="flex flex-col items-center justify-center p-2 text-white ${activePage === 'home' ? 'text-igBlue font-bold' : 'opacity-70'}">
                        <i class="fa-solid fa-calendar-days text-lg"></i>
                        <span class="text-[10px] mt-0.5">Beranda</span>
                    </button>
                    <button onclick="toggleShortcutBar()" class="flex flex-col items-center justify-center p-2 text-igBlue">
                        <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                        <span class="text-[10px] mt-0.5 font-bold">Pintasan</span>
                    </button>
                    <button onclick="navigateTo('messages')" class="flex flex-col items-center justify-center p-2 text-white ${activePage === 'messages' ? 'text-igBlue font-bold' : 'opacity-70'}">
                        <i class="fa-regular fa-paper-plane text-lg"></i>
                        <span class="text-[10px] mt-0.5">Pesan</span>
                    </button>
                    <button onclick="navigateTo('profile')" class="flex flex-col items-center justify-center p-2 text-white ${activePage === 'profile' ? 'text-igBlue font-bold' : 'opacity-70'}">
                        <img src="${currentUser.avatar}" class="w-5 h-5 rounded-full inline mb-0.5 ${activePage === 'profile' ? 'border-2 border-igBlue' : ''}" />
                        <span class="text-[10px]">Profil</span>
                    </button>
                </div>
            `;

            return { desktopNav, mobileNav };
        }


        // --- BAR PINTASAN TIMELINE (SHORTCUT DOCK BAR) UNTUK TIMELINE BERSAMA ---

        function renderShortcutBar() {
            if (!isShortcutBarOpen) return "";

            const filteredMemories = memories.filter(m => 
                m.title.toLowerCase().includes(shortcutSearchQuery.toLowerCase()) || 
                m.description.toLowerCase().includes(shortcutSearchQuery.toLowerCase())
            ).sort((a,b) => new Date(b.date) - new Date(a.date));

            return `
                <div class="fixed bottom-16 md:bottom-6 left-4 md:left-72 right-4 bg-igGray/95 border border-igBlue/40 rounded-2xl shadow-2xl z-40 p-4 transition-all duration-300 backdrop-blur-md max-h-[340px] flex flex-col">
                    <div class="flex items-center justify-between border-b border-igBorder pb-3 mb-3">
                        <div class="flex items-center gap-2">
                            <span class="p-1.5 bg-igDarkBlue/60 text-igBlue rounded-lg text-xs"><i class="fa-solid fa-clock-rotate-left"></i></span>
                            <h4 class="font-bold text-xs text-white">Bar Pintasan Timeline Plengeran</h4>
                        </div>
                        <div class="flex items-center gap-3">
                            <input id="shortcut-search" type="text" oninput="updateShortcutSearch(this.value)" placeholder="Cari kenangan..." value="${shortcutSearchQuery}" class="bg-black text-[11px] border border-igBorder rounded px-2.5 py-1 text-white outline-none focus:border-igBlue w-32 md:w-48">
                            <button onclick="toggleShortcutBar()" class="text-gray-400 hover:text-white transition text-xs"><i class="fa-solid fa-chevron-down"></i> Sembunyikan</button>
                        </div>
                    </div>

                    <!-- Horisontal List Cards Kenangan Bersama -->
                    <div class="flex-1 overflow-x-auto overflow-y-hidden flex gap-4 p-1 no-scrollbar items-center">
                        ${filteredMemories.length > 0 ? filteredMemories.map(m => {
                            const creator = accounts.find(a => a.id === m.userId) || { username: "anggota", avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=anon" };
                            return `
                                <div class="w-48 md:w-56 bg-black border border-igBorder rounded-xl p-2.5 flex flex-col gap-2 flex-shrink-0 relative group shadow-lg">
                                    <div class="w-full aspect-video rounded overflow-hidden relative">
                                        <img src="${m.image}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/300/200'">
                                        <span class="absolute top-1 left-1 text-[8px] bg-igBlue text-white font-bold uppercase px-1.5 py-0.5 rounded">${formatIndonesianDate(m.date)}</span>
                                    </div>
                                    <div class="min-w-0">
                                        <h5 class="font-bold text-[11px] text-white truncate">${m.title}</h5>
                                        <p class="text-[9px] text-gray-500 flex items-center gap-1 mt-0.5">
                                            <img src="${creator.avatar}" class="w-3.5 h-3.5 rounded-full">
                                            <span class="truncate">@${creator.username}</span>
                                        </p>
                                    </div>
                                    <div class="flex gap-1.5 mt-1">
                                        <button onclick="viewMemoryDetails('${m.id}')" class="flex-1 bg-igHover hover:bg-igBorder text-[9px] font-bold py-1 rounded transition">Detail</button>
                                        ${activePage === 'messages' && currentChatWithId ? `
                                            <button onclick="shareMemoryToChat('${m.id}')" class="flex-1 bg-igBlue hover:bg-blue-600 text-[9px] font-bold py-1 rounded text-white transition"><i class="fa-solid fa-share"></i> Kirim</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('') : `
                            <div class="w-full text-center text-gray-500 py-6 text-xs">
                                <i class="fa-regular fa-folder-open text-xl mb-1 block"></i>
                                Belum ada kenangan bersama yang tersimpan.
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        window.toggleShortcutBar = function() {
            isShortcutBarOpen = !isShortcutBarOpen;
            renderApp();
        }

        window.updateShortcutSearch = function(val) {
            shortcutSearchQuery = val;
            renderApp();
            const inp = document.getElementById('shortcut-search');
            if (inp) {
                inp.focus();
                inp.setSelectionRange(val.length, val.length);
            }
        }

        window.viewMemoryDetails = function(id) {
            const m = memories.find(mem => mem.id == id);
            if (!m) return;
            const creator = accounts.find(a => a.id === m.userId) || { username: "anggota", avatar: "https://api.dicebear.com/7.x/adventurer/svg?seed=anon" };
            showCustomModal(
                m.title,
                `
                <div class="flex flex-col gap-3">
                    <div class="flex items-center gap-2 pb-2 border-b border-igBorder">
                        <img src="${creator.avatar}" class="w-6 h-6 rounded-full bg-igGray">
                        <span class="text-xs text-gray-300">Dibagikan oleh <strong class="text-white">@${creator.username}</strong></span>
                    </div>
                    <p class="text-xs text-igBlue font-bold uppercase tracking-wider">${formatIndonesianDate(m.date)}</p>
                    <div class="w-full aspect-video rounded overflow-hidden bg-black">
                        <img src="${m.image}" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/600/400'">
                    </div>
                    <p class="text-xs text-gray-300 leading-relaxed whitespace-pre-wrap">${m.description}</p>
                </div>
                `
            );
        }


        // --- HALAMAN UTAMA: KALENDER & TIMELINE KERSAMA (BERANDA) ---

        function renderHome() {
            const currentUser = getCurrentUser();
            if (!currentUser) return "";
            
            const allMemories = memories;

            const displayedMemories = selectedDateStr 
                ? allMemories.filter(m => m.date === selectedDateStr)
                : [...allMemories].sort((a,b) => new Date(b.date) - new Date(a.date));

            const calendarHtml = generateCalendarWidget(allMemories);

            return `
                <div class="flex-1 flex flex-col md:flex-row h-screen overflow-hidden pb-16 md:pb-0">
                    <!-- Sisi Kiri / Bagian Atas: Kalender Bersama & Form Tambah Kenangan -->
                    <div class="w-full md:w-[420px] border-r border-igBorder flex flex-col bg-black h-full overflow-y-auto no-scrollbar p-4 md:p-6 gap-6">
                        <div class="md:hidden flex items-center justify-between border-b border-igBorder pb-3">

        // --- ASSET SIMULATOR ---
        window.generateRandomIllustration = function() {
            const randomId = Math.floor(Math.random() * 1000);
            const inputImg = document.getElementById('mem-image');
            if (inputImg) {
                inputImg.value = `https://picsum.photos/seed/${randomId}/800/600`;

        // --- MANAJEMEN KALENDER UTILITY ---
        function generateCalendarWidget(allMemories) {
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const numDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            const memoryDates = new Set(allMemories.map(m => m.date));
            const daysOfWeek = ["M", "S", "S", "R", "K", "J", "S"];
            let cells = [];

            for (let i = 0; i < firstDayIndex; i++) {
                cells.push(`<td class="p-1.5 text-center text-[11px] text-gray-700">-</td>`);
            }

            for (let day = 1; day <= numDays; day++) {
                const formattedDate = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const hasMemory = memoryDates.has(formattedDate);
                const isSelected = selectedDateStr === formattedDate;

                let cellClass = "p-1.5 text-center text-xs rounded-full cursor-pointer transition relative hover:bg-igHover ";
                if (isSelected) {
                    cellClass += "bg-igBlue text-white font-bold";
                } else if (hasMemory) {
                    cellClass += "bg-igDarkBlue/40 text-igBlue font-bold hover:bg-igDarkBlue/60";
                } else {
                    cellClass += "text-gray-300";
                }

                cells.push(`
                    <td class="p-1">
                        <div onclick="filterByDate('${formattedDate}')" class="${cellClass}">
                            ${day}
                            ${hasMemory && !isSelected ? `<span class="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 bg-igBlue rounded-full"></span>` : ''}
                        </div>
                    </td>
                `);
            }

            let row = [];
            let rows = [];
            cells.forEach((cell, i) => {
                row.push(cell);
                if ((i + 1) % 7 === 0 || i === cells.length - 1) {
                    rows.push(`<tr>${row.join('')}</tr>`);
                    row = [];
                }
            });

            return `
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            ${daysOfWeek.map(d => `<th class="text-center text-[10px] font-bold text-gray-500 pb-2">${d}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.join('')}
                    </tbody>
                </table>
            `;
        }


        // --- MANAJEMEN TIMELINE UTILITY ---
        window.addNewMemory = async function(event) {
            event.preventDefault();
            const date = document.getElementById('mem-date').value;
            const title = document.getElementById('mem-title').value.trim();
            let image = document.getElementById('mem-image').value.trim();
            const description = document.getElementById('mem-description').value.trim();
            const currentUser = getCurrentUser();

            if (!date || !title || !image || !description || !currentUser) return;

            // Logika konversi Google Drive ke Direct Link
            const driveReg1 = /\/file\/d\/([a-zA-Z0-9_-]+)/;
            const driveReg2 = /[\?&]id=([a-zA-Z0-9_-]+)/;
            const driveReg3 = /lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/;
            
            let driveId = "";
            if (image.includes("drive.google.com")) {
                const match1 = image.match(driveReg1);
                const match2 = image.match(driveReg2);
                if (match1 && match1[1]) {
                    driveId = match1[1];
                } else if (match2 && match2[1]) {
                    driveId = match2[1];
                }
            } else if (image.includes("lh3.googleusercontent.com")) {
                const match3 = image.match(driveReg3);
                if (match3 && match3[1]) {
                    driveId = match3[1];
                }
            } else if (!image.startsWith("http") && image.length > 5) {
                driveId = image;
            }

            if (driveId) {
                image = `https://lh3.googleusercontent.com/d/${driveId}`;
            }

            const newMemoryId = Date.now().toString();
            const newMemory = {
                id: newMemoryId,
                userId: currentUser.id,
                date: date,
                title: title,
                image: image,
                description: description
            };

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('memories', newMemoryId), newMemory);
                } else {
                    memories.push(newMemory);
                    saveLocalData();
                }

                const targetDate = new Date(date);
                currentYear = targetDate.getFullYear();
                currentMonth = targetDate.getMonth();

                showCustomToast("Plengeran baru berhasil disimpan!");
                renderApp();
            } catch (err) {
                console.error("Gagal menyimpan momen:", err);
                showCustomToast("Gagal menyimpan momen ke basis data.");
            }
        }

        window.confirmDeleteMemory = function(id) {

        window.closeConfirmDelete = function() {

        window.executeDeleteMemory = async function(id) {
            try {
                if (useCloud) {
                    const memoryDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'memories', id);

                memories = memories.filter(m => m.id != id);

                showCustomToast("Plengeran berhasil dihapus.");
                renderApp();
            } catch (err) {
                console.error(err);
                showCustomToast("Gagal menghapus.");
            }
        }

                                <div class="text-center py-10 px-4 text-gray-500 text-xs">
                                    <i class="fa-regular fa-comments text-3xl mb-2 text-gray-600 block"></i>
                                    Tidak ada pengguna terdaftar lain saat ini.
                                </div>

                            <!-- Section Teman -->
                            ${humanFriends.length > 0 ? `
                                <div>
                                    <p class="text-[10px] text-gray-500 font-bold px-3 py-1.5 uppercase tracking-wider">Teman Terdaftar</p>
                                    ${humanFriends.map(friend => {
                                        const roomKey = getChatRoomId(currentUser.id, friend.id);
                                        const friendChats = chats[roomKey] || [];
                                        const lastChat = friendChats[friendChats.length - 1] || { text: "Mulai percakapan...", time: "" };

                                        const isWeFollowing = isFollowingTarget(currentUser.id, friend.id);

                                        return `
                                            <div onclick="selectChat('${friend.id}')" class="flex items-center gap-3 p-2.5 rounded-lg cursor-pointer transition ${isCurrent ? 'bg-igHover' : 'hover:bg-igHover'}">
                                                <div class="relative flex-shrink-0">
                                                    <img src="${friend.avatar}" class="w-10 h-10 rounded-full bg-igGray p-0.5 border border-igBorder">
                                                    <span class="absolute bottom-0 right-0 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-black"></span>
                                                </div>
                                                <div class="flex-1 min-w-0">
                                                    <div class="flex justify-between items-baseline">

                        ${activeFriend ? `

                                                <button onclick="toggleFollowUser('${activeFriend.id}')" class="text-[9px] font-bold px-2 py-0.5 rounded-md ${isFollowingTarget(currentUser.id, activeFriend.id) ? 'bg-igBorder text-gray-300' : 'bg-igBlue text-white'}">

        window.scrollToBottom = function() {
            setTimeout(() => {
                const chatContainer = document.getElementById('chat-messages');
                if (chatContainer) {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            }, 50);
        }

        window.shareMemoryToChat = async function(memoryId) {
            const m = memories.find(mem => mem.id == memoryId);
            if (!m || !currentChatWithId) return;

            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}`;

            const activeRoomId = getChatRoomId(currentUser.id, currentChatWithId);
            const activeHistory = chats[activeRoomId] || [];
            const updatedHistory = [...activeHistory, {
                sender: currentUser.id,
                text: `Plengeran: *${m.title}* - ${m.description}`,
                time: timeStr,
                isSharedMemory: true,
                memoryImage: m.image
            }];

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('chats', activeRoomId), { messages: updatedHistory });
                } else {
                    chats[activeRoomId] = updatedHistory;
                    saveLocalData();
                    renderApp();
                }
                scrollToBottom();
            } catch (err) {
                console.error(err);
            }
        }

        window.sendMessage = async function(event) {
            event.preventDefault();
            const input = document.getElementById('message-input');
            if (!input || input.value.trim() === "" || !currentChatWithId) return;

            const text = input.value;
            input.value = "";

            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}`;

            const activeRoomId = getChatRoomId(currentUser.id, currentChatWithId);
            const activeHistory = chats[activeRoomId] || [];
            const updatedHistory = [...activeHistory, {
                sender: currentUser.id,
                text: text,
                time: timeStr
            }];

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('chats', activeRoomId), { messages: updatedHistory });
                } else {
                    chats[activeRoomId] = updatedHistory;
                    saveLocalData();
                    renderApp();
                }
                scrollToBottom();
            } catch (err) {
                console.error(err);
            }
        }


        // --- HALAMAN PROFIL AKUN ---

        function renderProfile(targetUserId = null) {
            const currentUser = getCurrentUser();
            if (!currentUser) return "";
            
            let userToShow = currentUser;

            if (targetUserId) {
                userToShow = accounts.find(a => a.id === targetUserId) || currentUser;
            }

            const isOwnProfile = userToShow.id === currentUser.id;
            
            const userMemoriesCount = memories.filter(m => m.userId === userToShow.id).length;

            const otherAccounts = accounts.filter(a => 
                a.id !== currentUser.id && 
                a.id !== userToShow.id &&
                (a.username.toLowerCase().includes(profileSearchQuery.toLowerCase()) || 
                 a.fullName.toLowerCase().includes(profileSearchQuery.toLowerCase()))
            );

            return `
                <div class="flex-1 p-4 md:p-8 overflow-y-auto max-h-screen pb-20 md:pb-8 flex justify-center bg-black">
                    <div class="max-w-xl w-full">
                        <div class="flex justify-between items-center border-b border-igBorder pb-4 mb-6">
                            <h2 class="font-bold text-lg text-white flex items-center gap-2">
                                <i class="fa-regular fa-user text-igBlue"></i> ${isOwnProfile ? 'Profil Akun Anda' : `Profil @${userToShow.username}`}
                            </h2>
                            ${!isOwnProfile ? `<button onclick="navigateTo('home')" class="text-xs text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left"></i> Kembali</button>` : ''}
                        </div>

                        <!-- Kartu Profil -->
                        <div class="bg-igGray border border-igBorder rounded-2xl p-6 flex flex-col items-center text-center shadow-lg">
                            <div class="relative mb-4">
                                <img src="${userToShow.avatar}" class="w-28 h-28 rounded-full bg-black border-4 border-igBorder p-1.5">
                                <span class="absolute bottom-1 right-2 bg-green-500 w-5 h-5 rounded-full border-4 border-igGray"></span>
                            </div>

                            <h3 class="font-bold text-lg text-white">${userToShow.fullName}</h3>
                            <p class="text-sm text-igBlue font-semibold mb-3">@${userToShow.username}</p>

                            <!-- Statistik -->
                            <div class="flex justify-center gap-6 py-3 border-t border-b border-igBorder w-full mb-4">
                                <div class="text-center flex-1">
                                    <p class="font-bold text-base text-white">${userMemoriesCount}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Kontribusi Momen</p>
                                </div>
                                <div class="text-center flex-1 border-l border-r border-igBorder">
                                    <p class="font-bold text-base text-white">${getFollowersCount(userToShow.id)}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Pengikut</p>
                                </div>
                                <div class="text-center flex-1">
                                    <p class="font-bold text-base text-white">${getFollowingCount(userToShow.id)}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Diikuti</p>
                                </div>
                            </div>

                            <!-- Bio -->
                            <div class="w-full text-left bg-black/40 border border-igBorder/50 p-4 rounded-xl mb-6">
                                <p class="text-xs text-gray-400 font-bold mb-1"><i class="fa-solid fa-feather-pointed"></i> Biografi</p>
                                <p class="text-xs text-gray-300 whitespace-pre-wrap leading-relaxed">${userToShow.bio || 'Tidak ada deskripsi bio.'}</p>
                            </div>

                            <!-- Tombol Tindakan -->
                            <div class="flex gap-2 w-full">
                                ${isOwnProfile ? `
                                    <button onclick="showEditBioModal()" class="w-full bg-black hover:bg-igHover border border-igBorder text-xs font-semibold py-2.5 rounded-lg transition text-white">
                                        <i class="fa-regular fa-pen-to-square mr-1"></i> Edit Profil & Bio Anda
                                    </button>
                                ` : `
                                    <button onclick="toggleFollowUser('${userToShow.id}')" class="flex-1 ${isFollowingTarget(currentUser.id, userToShow.id) ? 'bg-igBorder hover:bg-igHover text-white' : 'bg-igBlue hover:bg-blue-600 text-white'} text-xs font-semibold py-2.5 rounded-lg transition">
                                        <i class="fa-solid ${isFollowingTarget(currentUser.id, userToShow.id) ? 'fa-user-minus' : 'fa-user-plus'} mr-1"></i> 
                                        ${isFollowingTarget(currentUser.id, userToShow.id) ? 'Batal Mengikuti' : 'Ikuti Teman'}
                                    </button>
                                    <button onclick="navigateTo('messages', '${userToShow.id}')" class="flex-1 bg-igGray hover:bg-igHover border border-igBorder text-xs font-semibold py-2.5 rounded-lg transition text-white">
                                        <i class="fa-regular fa-paper-plane mr-1"></i> Kirim Pesan
                                    </button>
                                `}
                            </div>
                        </div>

                        <!-- Rekomendasi / Pencarian Pengguna Lain -->
                        <div class="mt-6 bg-igGray border border-igBorder rounded-2xl p-4">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4">
                                <h4 class="font-bold text-xs text-white flex items-center gap-2">
                                    <i class="fa-solid fa-user-group text-igBlue"></i> Temukan Pengguna Lain
                                </h4>
                                <!-- BILAH PENCARIAN PROFIL -->
                                <div class="relative w-full md:w-48">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none">
                                        <i class="fa-solid fa-magnifying-glass text-[10px] text-gray-500"></i>
                                    </span>
                                    <input id="profile-search-input" type="text" oninput="handleProfileSearch(this.value)" value="${profileSearchQuery}" placeholder="Cari teman..." class="w-full bg-black border border-igBorder rounded px-7 py-1 text-[11px] text-white outline-none focus:border-igBlue">
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-3">
                                ${otherAccounts.length > 0 ? otherAccounts.map(acc => `
                                    <div class="flex items-center justify-between bg-black/30 p-2.5 rounded-xl border border-igBorder/40">
                                        <div class="flex items-center gap-2 cursor-pointer" onclick="viewUserProfil('${acc.id}')">
                                            <img src="${acc.avatar}" class="w-8 h-8 rounded-full bg-igGray">
                                            <div class="text-left min-w-0">
                                                <p class="font-bold text-xs text-white truncate hover:underline">@${acc.username}</p>
                                                <p class="text-[9px] text-gray-500 truncate">${acc.fullName}</p>
                                            </div>
                                        </div>
                                        <button onclick="toggleFollowUser('${acc.id}')" class="text-[10px] font-bold px-3 py-1 rounded-md ${isFollowingTarget(currentUser.id, acc.id) ? 'bg-igBorder text-gray-400' : 'bg-igBlue text-white'}">
                                            ${isFollowingTarget(currentUser.id, acc.id) ? 'Batal Ikut' : 'Ikuti'}
                                        </button>
                                    </div>
                                `).join('') : `
                                    <p class="text-xs text-gray-500 text-center py-4">Belum ada pengguna terdaftar lain yang cocok.</p>
                                `}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }


        // --- MODAL & POPUP DIALOG UTILITY ---

        window.showCustomToast = function(message) {
            const oldToast = document.getElementById('custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = 'fixed bottom-20 md:bottom-6 right-6 bg-igBlue text-white text-xs font-semibold px-4 py-3 rounded-lg shadow-lg z-50 transition transform translate-y-10 opacity-0 duration-300';
            toast.innerText = message;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        window.showCustomModal = function(title, contentHtml) {
            const backdrop = document.createElement('div');
            backdrop.id = 'custom-modal';
            backdrop.className = 'fixed inset-0 bg-black bg-opacity-85 flex items-center justify-center p-4 z-50';
            
            backdrop.innerHTML = `
                <div class="bg-igGray border border-igBorder rounded-xl max-w-md w-full p-6 relative">
                    <button onclick="closeCustomModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    <h3 class="font-bold text-sm mb-4 text-white">${title}</h3>
                    <div class="text-gray-300 text-xs mb-6">${contentHtml}</div>
                    <div class="flex justify-end">
                        <button onclick="closeCustomModal()" class="bg-igBlue hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg text-xs transition">Tutup</button>
                    </div>
                </div>
            `;
            document.body.appendChild(backdrop);
        }

        window.closeCustomModal = function() {
            const modal = document.getElementById('custom-modal');
            if (modal) modal.remove();
        }

        window.showEditBioModal = function() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            showCustomModal("Ubah Informasi Profil", `
                <div class="flex flex-col gap-3">
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Nama Lengkap</label>
                        <input id="edit-fullname" type="text" value="${currentUser.fullName}" class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Ubah Bio & Deskripsi</label>
                        <textarea id="edit-bio" rows="3" class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none resize-none">${currentUser.bio}</textarea>
                    </div>
                    <button onclick="saveProfileBio()" class="w-full bg-igBlue hover:bg-blue-600 text-white font-bold py-2 rounded text-xs transition mt-2">Simpan Perubahan</button>
                </div>
            `);
        }

        window.saveProfileBio = async function() {
            const fullName = document.getElementById('edit-fullname').value;
            const bio = document.getElementById('edit-bio').value;
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            try {
                if (useCloud) {
                    const userDocRef = getPublicDataDocRef('accounts', currentUser.id);
                    await updateDoc(userDocRef, {
                        fullName: fullName,
                        bio: bio
                    });
                } else {
                    const idx = accounts.findIndex(a => a.id === currentUser.id);
                    if (idx !== -1) {
                        accounts[idx].fullName = fullName;
                        accounts[idx].bio = bio;
                        saveLocalData();
                    }
                }
                closeCustomModal();
                showCustomToast("Informasi profil berhasil diperbarui!");
                renderApp();
            } catch (err) {
                console.error(err);
                showCustomToast("Gagal memperbarui profil.");
            }
        }

        window.viewUserProfil = function(userId) {
            navigateTo('profile');
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                ${renderNavigation().desktopNav}
                ${renderProfile(userId)}
                ${renderShortcutBar()}
                ${renderNavigation().mobileNav}
            `;
        }


        // --- SCREEN LAYAR MASUK / DAFTAR ---

        function renderAuthScreen() {
            if (authMode === 'login') {
                return `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 h-screen w-full bg-black">
                        <div class="max-w-sm w-full bg-igGray border border-igBorder rounded-2xl p-8 shadow-2xl flex flex-col items-center text-center">
                            <i class="fa-solid fa-calendar-heart text-5xl text-igBlue mb-4"></i>
                            <h1 class="font-bold text-2xl text-white mb-1">PlengerGram</h1>
                            <p class="text-xs text-gray-500 mb-6">Kalender Plenger & Timeline Hidup Anda</p>

                            <form onsubmit="handleLogin(event)" class="w-full flex flex-col gap-4 text-left">
                                <div>
                                    <label class="block text-[11px] text-gray-400 mb-1 font-semibold">Nama Pengguna (Username)</label>
                                    <input id="login-username" type="text" placeholder="Masukkan username" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                                </div>
                                <div>
                                    <label class="block text-[11px] text-gray-400 mb-1 font-semibold">Kata Sandi (Password)</label>
                                    <input id="login-password" type="password" placeholder="Masukkan password" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                                </div>
                                <button type="submit" class="w-full bg-igBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-lg text-xs transition mt-2">Masuk Akun</button>
                            </form>

                            <div class="w-full border-t border-igBorder my-6 relative">
                                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-igGray px-3 text-[10px] text-gray-500 font-bold uppercase tracking-wider">ATAU</span>
                            </div>

                            <p class="text-xs text-gray-400">Belum memiliki akun?</p>
                            <button onclick="toggleAuthMode()" class="text-xs text-igBlue font-bold hover:underline mt-1">Daftar Akun Baru</button>
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="flex-1 flex flex-col items-center justify-center p-6 h-screen w-full bg-black">
                        <div class="max-w-sm w-full bg-igGray border border-igBorder rounded-2xl p-8 shadow-2xl flex flex-col items-center text-center max-h-[90vh] overflow-y-auto no-scrollbar">
                            <i class="fa-solid fa-calendar-plus text-5xl text-igBlue mb-3"></i>
                            <h1 class="font-bold text-xl text-white mb-1">Daftar PlengerGram</h1>
                            <p class="text-xs text-gray-500 mb-5">Simpan Plengeran Disini (Aman & Stabil)</p>

                            <form onsubmit="handleSignUp(event)" class="w-full flex flex-col gap-3 text-left">
                                <div>
                                    <label class="block text-[10px] text-gray-400 mb-1 font-semibold">Nama Pengguna (Username)*</label>
                                    <input id="signup-username" type="text" placeholder="Username" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] text-gray-400 mb-1 font-semibold">Nama Lengkap*</label>
                                    <input id="signup-fullname" type="text" placeholder="Nama Plenger" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] text-gray-400 mb-1 font-semibold">Kata Sandi (Password)*</label>
                                    <input id="signup-password" type="password" placeholder="Buat Password" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] text-gray-400 mb-1 font-semibold">Tulis Bio Singkat</label>
                                    <textarea id="signup-bio" rows="2" placeholder="Tulis bio" class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500 resize-none"></textarea>
                                </div>
                                <button type="submit" class="w-full bg-igBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-lg text-xs transition mt-2">Buat & Masuk Akun</button>
                            </form>

                            <div class="w-full border-t border-igBorder my-5 relative">
                                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-igGray px-3 text-[10px] text-gray-500 font-bold uppercase tracking-wider">ATAU</span>
                            </div>

                            <p class="text-xs text-gray-400">Sudah memiliki akun?</p>
                            <button onclick="toggleAuthMode()" class="text-xs text-igBlue font-bold hover:underline mt-1">Silakan Masuk</button>
                        </div>
                    </div>
                `;
            }
        }


        // --- COORDINATOR UTAMA RENDER APLIKASI ---

        function renderApp() {
            const appDiv = document.getElementById('app');

            if (!isUserLoggedIn) {
                appDiv.innerHTML = renderAuthScreen();
                return;
            }

            const { desktopNav, mobileNav } = renderNavigation();

            let pageContent = "";
            switch (activePage) {
                case 'home':
                    pageContent = renderHome();
                    break;
                case 'messages':
                    pageContent = renderMessages();
                    break;
                case 'profile':
                    pageContent = renderProfile();
                    break;
                default:
                    pageContent = renderHome();
            }

            appDiv.innerHTML = `
                ${desktopNav}
                ${pageContent}
                ${renderShortcutBar()}
                ${mobileNav}
            `;
            
            if (activePage === 'messages') {
                scrollToBottom();
            }
        }

        // --- INISIALISASI UTAMA & SINKRONISASI CLOUD ---
        (async function init() {
            // Setup data lokal terlebih dahulu agar app langsung bisa dibuka tanpa loading macet
            if (!useCloud) {
                accounts = JSON.parse(localStorage.getItem('pg_accounts')) || [];
                memories = JSON.parse(localStorage.getItem('pg_memories')) || [];
                chats = JSON.parse(localStorage.getItem('pg_chats')) || {};
                
                const loggedInId = localStorage.getItem('pg_logged_in_id');
                if (loggedInId && accounts.some(acc => acc.id === loggedInId)) {
                    currentUserId = loggedInId;
                    isUserLoggedIn = true;
                }
            }

            // Render antarmuka aplikasi instan
            renderApp();
            
            if (useCloud) {
                // Jalankan autentikasi Firebase terlebih dahulu jika Cloud aktif (Rule 3)
                await authenticateUser();
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        setupDataSync(user);
                    } else {
                        renderApp();
                    }
                });
            }
        })();
    </script>
</body>
</html>
